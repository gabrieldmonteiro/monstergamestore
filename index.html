<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Monster GameStore — Jogos PS4 e PS5</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>

  <section class="products-section">
    <div class="container">
      <h2 class="section-title" id="category-title">Produtos em destaque</h2>
      <div class="row g-3 g-md-4" id="products-grid"></div>
    </div>
  </section>
  <div id="footer"></div> 

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script>
    const cat = getQueryParam('cat');
    initSite(cat ? 'produtos' : 'inicio').then(() => {
      renderProducts('products-grid', cat || null);
    });
  </script>
</body>
</html>
