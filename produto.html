<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Produto — Monster GameStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>

  <main class="container product-detail-page">
    <nav aria-label="breadcrumb" class="mb-4">
      <ol class="breadcrumb" id="breadcrumb"></ol>
    </nav>
    <div id="product-content"></div>
  </main>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script>
    initSite('produtos').then(() => {
      const id = getQueryParam('id');
      const store = getStore();
      const el = document.getElementById('product-content');
      const product = store.products.find((p) => p.id === id && p.visible);

      if (!product) {
        el.innerHTML = '<div class="empty-state"><h3>Produto não encontrado</h3><a href="index.html" class="btn btn-primary mt-3">Voltar à loja</a></div>';
        return;
      }

      const path = getCategoryPath(store, product.categoryId);
      const visible = getVisibleCategories(store).some((c) => c.id === product.categoryId);

      if (!visible) {
        el.innerHTML = '<div class="empty-state"><h3>Produto indisponível</h3><a href="index.html" class="btn btn-primary mt-3">Voltar à loja</a></div>';
        return;
      }

      document.title = escapeHtml(getDisplayName(product)) + ' — Monster GameStore';
      document.getElementById('breadcrumb').innerHTML =
        '<li class="breadcrumb-item"><a href="index.html">Início</a></li>' +
        '<li class="breadcrumb-item"><a href="index.html?cat=' + encodeURIComponent(product.categoryId) + '">' + escapeHtml(path.join(' › ')) + '</a></li>' +
        '<li class="breadcrumb-item active" aria-current="page">' + escapeHtml(product.name) + '</li>';
      el.innerHTML = renderProductDetail(product);
    });
  </script>
</body>
</html>
